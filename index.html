<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker</title>
    <link rel="shortcut icon" href="./images/jobs.png" type="image/x-icon" />

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- CSS -->
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC] min-h-screen">
    <header class="w-3/4 mx-auto space-y-6 pt-10 pb-6">
      <h1 class="font-bold text-3xl">Job Application Tracker</h1>
      <!--Info Cards Container -->
      <div class="grid grid-cols-3 gap-4">
        <div class="card card-border bg-base-100">
          <div class="card-body">
            <p class="font-medium">Total</p>
            <h2 id="total-count" class="text-2xl font-bold">8</h2>
          </div>
        </div>

        <div class="card card-border bg-base-100">
          <div class="card-body">
            <p class="font-medium">Interview</p>
            <h2 id="interview-count" class="text-2xl font-bold text-[#10B981]">
              0
            </h2>
          </div>
        </div>

        <div class="card card-border bg-base-100">
          <div class="card-body">
            <p class="font-medium">Rejected</p>
            <h2 id="rejected-count" class="text-2xl font-bold text-[#EF4444]">
              0
            </h2>
          </div>
        </div>
      </div>

      <hr class="bg-[#E6E7E9] border-none h-[1.5px]" />
    </header>

    <main class="w-3/4 mx-auto space-y-5">
      <!-- Info Section -->
      <div class="flex justify-between">
        <h2 class="font-semibold text-xl">Available Jobs</h2>
        <p id="amount-info" class="text-[#64748B] font-medium">8 jobs</p>
      </div>

      <!-- Toggle Buttons Container -->
      <div class="flex gap-3">
        <button
          id="all-toggle-btn"
          class="btn bg-blue-400 text-white w-20 text-[12px]"
        >
          All
        </button>

        <button
          id="interview-toggle-btn"
          class="btn text-[#64748B] w-20 text-[12px]"
        >
          Interview
        </button>

        <button
          id="rejected-toggle-btn"
          class="btn text-[#64748B] w-20 text-[12px]"
        >
          Rejected
        </button>
      </div>

      <!-- Job Cards Section -->
      <section id="job-cards-container" class="flex flex-col gap-4 pb-10">
        <!-- Jobs will render here -->
      </section>
    </main>

    <!-- Scripts -->
    <script src="./scripts/machine.js"></script>
    <script src="./scripts/script.js"></script>
  </body>
</html>
