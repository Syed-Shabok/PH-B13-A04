<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Tracker</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Daisy UI -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-[#F8FAFC]">
    <header class="w-3/4 mx-auto space-y-6 py-10">
      <h1 class="font-bold text-3xl">Job Application Tracker</h1>
      <!-- Cards Container -->
      <div class="grid grid-cols-3 gap-4">
        <div class="card card-border bg-base-100">
          <div class="card-body">
            <p class="font-medium">Total</p>
            <h2 id="total-count" class="text-2xl font-bold">8</h2>
          </div>
        </div>

        <div class="card card-border bg-base-100">
          <div class="card-body">
            <p class="font-medium">Interview</p>
            <h2 id="interview-count" class="text-2xl font-bold text-[#10B981]">
              0
            </h2>
          </div>
        </div>

        <div class="card card-border bg-base-100">
          <div class="card-body">
            <p class="font-medium">Rejected</p>
            <h2 id="rejected-count" class="text-2xl font-bold text-[#EF4444]">
              0
            </h2>
          </div>
        </div>
      </div>

      <hr class="bg-[#E6E7E9] border-none h-[1.5px]" />
    </header>
  </body>
</html>
